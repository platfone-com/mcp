name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v1.0.0)"
        required: true
        type: string

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. Validate the tag ──────────────────────────────────────────────
  validate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag exists and matches v* pattern
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag '$TAG' does not match the expected pattern v<major>.<minor>.<patch>"
            exit 1
          fi
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist in the repository"
            exit 1
          fi
          echo "✓ Tag $TAG is valid"

  # ── 2. Build at the tag ref ──────────────────────────────────────────
  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────────────────
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes

  # ── 4. Publish to npm (requires environment approval) ────────────────
  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - run: npm publish --provenance --access public
